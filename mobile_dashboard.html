<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050607">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="System Core">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>Windows System MQTT Dashboard</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050607;
      --panel: rgba(13, 15, 17, 0.88);
      --panel-strong: rgba(20, 23, 25, 0.96);
      --line: rgba(255, 255, 255, 0.16);
      --line-hot: rgba(255, 182, 41, 0.78);
      --text: #f6f8f8;
      --muted: #8d969d;
      --subtle: #5a646d;
      --amber: #ffb629;
      --cyan: #66efff;
      --green: #4ef2a4;
      --red: #ff5364;
      --shadow: 0 0 34px rgba(255, 159, 37, 0.16);
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 12%, rgba(255, 182, 41, 0.13), transparent 34%),
        radial-gradient(circle at 100% 0%, rgba(102, 239, 255, 0.08), transparent 30%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.035) 25%, transparent 25%) 0 0 / 9px 9px,
        var(--bg);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px) 0 0 / 100% 42px,
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px) 0 0 / 42px 100%;
      mask-image: linear-gradient(to bottom, black, transparent 76%);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .snap {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100svh;
      overflow-x: hidden;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .page {
      width: 100vw;
      min-height: 100svh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    }

    .page-shell {
      width: min(100%, 1120px);
      height: calc(100svh - max(10px, env(safe-area-inset-top)) - max(10px, env(safe-area-inset-bottom)));
      margin: 0 auto;
      display: grid;
      grid-template-rows: 36px minmax(0, 1fr) 16px;
      gap: 8px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 15px;
      line-height: 1.05;
      font-weight: 850;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .subline {
      margin-top: 2px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 82px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      color: var(--red);
      box-shadow: 0 0 12px currentColor;
    }

    .status.online {
      color: var(--green);
      border-color: rgba(78, 242, 164, 0.36);
    }

    .status.online .dot {
      background: var(--green);
      color: var(--green);
    }

    .setup-grid {
      display: grid;
      grid-template-columns: minmax(250px, 0.92fr) 1.08fr;
      gap: 10px;
      min-height: 0;
    }

    .panel {
      position: relative;
      min-height: 0;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), transparent 34%),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 6px),
        var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 28px;
      height: 28px;
      border-top: 1px solid var(--line-hot);
      border-right: 1px solid var(--line-hot);
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .panel-title span {
      color: var(--muted);
      font-size: 9px;
      font-weight: 600;
      text-transform: none;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 0;
      color: var(--text);
      background: rgba(255, 255, 255, 0.055);
      outline: none;
    }

    input {
      min-height: 31px;
      padding: 6px 8px;
      font-size: 10px;
      font-weight: 700;
    }

    textarea {
      min-height: 104px;
      resize: none;
      padding: 8px;
      line-height: 1.35;
      font-size: 11px;
      font-weight: 650;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(255, 182, 41, 0.72);
      box-shadow: 0 0 0 2px rgba(255, 182, 41, 0.12);
    }

    .form-stack {
      display: grid;
      gap: 8px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      min-height: 31px;
      border: 1px solid rgba(255, 182, 41, 0.55);
      border-radius: 0;
      color: #120b02;
      background: linear-gradient(180deg, #ffd26f, #ff9f1f);
      font-size: 9px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    button.secondary {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
    }

    .chip-grid {
      display: flex;
      align-content: flex-start;
      flex-wrap: wrap;
      gap: 7px;
      max-height: 100%;
      overflow: auto;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      padding: 7px 9px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(0, 0, 0, 0.25);
      color: var(--muted);
      font-size: 10px;
      font-weight: 750;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chip.live {
      color: var(--green);
      border-color: rgba(78, 242, 164, 0.32);
    }

    .chip.configured {
      color: var(--amber);
      border-color: rgba(255, 182, 41, 0.38);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(250px, 34vw) 1fr;
      gap: 9px;
      min-height: 0;
    }

    .hero {
      position: relative;
      min-height: 0;
      height: 100%;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.08), transparent 28%),
        linear-gradient(315deg, rgba(255, 182, 41, 0.11), transparent 38%),
        var(--panel-strong);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .hero::before {
      inset: 9px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .hero::after {
      inset: auto 0 0;
      height: 44%;
      background: linear-gradient(to top, rgba(5, 6, 7, 0.86), transparent);
    }

    .gauge-wrap {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      height: calc(100% - 84px);
      padding-top: 5px;
    }

    .gauge {
      --cpu: 0;
      width: min(28vw, calc(100svh - 120px), 212px);
      aspect-ratio: 1;
      position: relative;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.08) 0 4%, transparent 5% 100%),
        repeating-conic-gradient(from -90deg, rgba(255, 255, 255, 0.65) 0 1deg, transparent 1deg 5deg),
        conic-gradient(from -135deg, var(--amber) calc(var(--cpu) * 2.7deg), rgba(255, 255, 255, 0.08) 0 270deg, transparent 0);
      filter: drop-shadow(0 0 26px rgba(255, 181, 41, 0.24));
    }

    .gauge::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background:
        radial-gradient(circle, #0d0f10 0 37%, transparent 38%),
        conic-gradient(from -135deg, rgba(255, 182, 41, 0.44), transparent 54%, rgba(102, 239, 255, 0.16), transparent 78%);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .gauge::after {
      content: "";
      position: absolute;
      width: 40%;
      height: 2px;
      left: 50%;
      top: 50%;
      transform-origin: 0 50%;
      transform: rotate(calc(-135deg + var(--cpu) * 2.7deg));
      background: linear-gradient(90deg, var(--amber), transparent);
      box-shadow: 0 0 16px var(--amber);
    }

    .gauge-center {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 44%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, #1d2022, #08090a 70%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-align: center;
    }

    .cpu-value {
      font-size: 27px;
      line-height: 1;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .cpu-label {
      margin-top: 3px;
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
    }

    .temp-module {
      position: absolute;
      right: 9px;
      bottom: 58px;
      z-index: 2;
      min-width: 108px;
      padding: 7px 8px;
      border: 1px solid var(--line);
      background: rgba(5, 6, 7, 0.78);
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    }

    .temp-title {
      color: var(--muted);
      font-size: 8px;
      text-transform: uppercase;
    }

    .temp-value {
      margin-top: 2px;
      display: flex;
      align-items: baseline;
      gap: 3px;
      font-size: 25px;
      line-height: 1;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .temp-value span {
      color: var(--amber);
      font-size: 13px;
    }

    .quick-stats {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 6px;
      padding: 0 10px 9px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 58px 1fr 34px;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 9px;
    }

    .bar {
      --value: 0%;
      height: 3px;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.55) 0 1px, transparent 1px 5px),
        linear-gradient(90deg, var(--amber) var(--value), rgba(255, 255, 255, 0.14) 0);
      box-shadow: 0 0 12px rgba(255, 182, 41, 0.25);
    }

    .value-right {
      color: var(--text);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 8px;
      min-height: 0;
      overflow: hidden;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 5px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 9px;
    }

    .metric-row strong {
      max-width: 58%;
      overflow: hidden;
      color: var(--text);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .duo,
    .net-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .ring {
      --pct: 0;
      display: grid;
      place-items: center;
      min-height: 78px;
      text-align: center;
    }

    .ring-face {
      width: min(58px, 11vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle, #101214 0 54%, transparent 55%),
        conic-gradient(var(--amber) calc(var(--pct) * 1%), rgba(255, 255, 255, 0.12) 0);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 0 20px rgba(255, 182, 41, 0.13);
    }

    .ring strong {
      display: block;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .ring span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 9px;
    }

    .net-cell {
      min-height: 58px;
      padding: 7px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.24);
    }

    .net-cell .label {
      color: var(--muted);
      font-size: 8px;
      text-transform: uppercase;
    }

    .net-cell .number {
      margin-top: 5px;
      font-size: 18px;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .net-cell .unit {
      color: var(--cyan);
      font-size: 9px;
    }

    .sparkline {
      width: 100%;
      height: 24px;
      display: block;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .disk-list {
      display: grid;
      gap: 6px;
    }

    .disk {
      display: grid;
      gap: 5px;
    }

    .disk-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 9px;
    }

    .disk-head strong {
      color: var(--text);
    }

    .footer-line {
      min-width: 0;
      color: var(--subtle);
      font-size: 9px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .page-dots {
      position: fixed;
      right: max(7px, env(safe-area-inset-right));
      top: 50%;
      z-index: 3;
      display: grid;
      gap: 6px;
      transform: translateY(-50%);
    }

    .page-dot {
      width: 5px;
      height: 18px;
      min-height: 18px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.08);
    }

    .page-dot.active {
      border-color: rgba(255, 182, 41, 0.82);
      background: var(--amber);
      box-shadow: 0 0 14px rgba(255, 182, 41, 0.48);
    }

    @media (orientation: portrait) {
      .page {
        padding: 12px;
      }

      .page-shell {
        height: auto;
        min-height: calc(100svh - 24px);
        grid-template-rows: auto auto auto;
      }

      .setup-grid,
      .content-grid,
      .metrics-grid {
        grid-template-columns: 1fr;
      }

      .content-grid {
        grid-template-rows: 330px auto;
      }

      .metrics-grid {
        grid-template-rows: none;
      }

      .ring-face {
        width: 76px;
      }
    }
  </style>
</head>
<body>
  <main class="snap" id="snapRoot">
    <section class="page setup-page" data-page="setup">
      <div class="page-shell">
        <header class="topbar">
          <div>
            <h1>System Core Fleet</h1>
            <div class="subline">Page 1: configure computer_name list. Swipe down for each computer.</div>
          </div>
          <div class="status" id="status"><span class="dot"></span><span id="statusText">Offline</span></div>
        </header>

        <div class="setup-grid">
          <section class="panel">
            <div class="panel-title">Display List <span id="configuredCount">0 computers</span></div>
            <div class="form-stack">
              <label>
                MQTT WebSocket
                <input id="brokerInput" value="wss://broker.emqx.io:8084/mqtt" autocomplete="off">
              </label>
              <label>
                Topic
                <input id="topicInput" value="jj/windows/system/status" autocomplete="off">
              </label>
              <label>
                computer_name, one per line
                <textarea id="computerInput" spellcheck="false" placeholder="DESKTOP-86TOS1M&#10;WORKSTATION-01"></textarea>
              </label>
              <div class="button-row">
                <button id="saveButton">Save Pages</button>
                <button class="secondary" id="connectButton">Connect</button>
              </div>
              <div class="button-row">
                <button class="secondary" id="disconnectButton">Disconnect</button>
                <button class="secondary" id="clearButton">Clear Data</button>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-title">Detected Computers <span>tap to add</span></div>
            <div class="chip-grid" id="detectedList"></div>
          </section>
        </div>

        <div class="footer-line" id="setupLog">Ready. Configure names, then connect MQTT.</div>
      </div>
    </section>

    <div id="computerPages"></div>
  </main>
  <nav class="page-dots" id="pageDots" aria-label="Page index"></nav>

  <script>
    const STORAGE_KEY = "system-core-computers-v2";
    const DEFAULT_NAMES = ["Preview Mode"];

    const state = {
      client: null,
      connected: false,
      configuredNames: loadConfiguredNames(),
      latestByName: new Map(),
      detectedNames: new Set(),
      historyByName: new Map()
    };

    const els = {
      snapRoot: document.querySelector("#snapRoot"),
      computerPages: document.querySelector("#computerPages"),
      pageDots: document.querySelector("#pageDots"),
      status: document.querySelector("#status"),
      statusText: document.querySelector("#statusText"),
      setupLog: document.querySelector("#setupLog"),
      configuredCount: document.querySelector("#configuredCount"),
      detectedList: document.querySelector("#detectedList"),
      brokerInput: document.querySelector("#brokerInput"),
      topicInput: document.querySelector("#topicInput"),
      computerInput: document.querySelector("#computerInput"),
      saveButton: document.querySelector("#saveButton"),
      connectButton: document.querySelector("#connectButton"),
      disconnectButton: document.querySelector("#disconnectButton"),
      clearButton: document.querySelector("#clearButton")
    };

    function loadConfiguredNames() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        if (Array.isArray(saved) && saved.length) return normalizeNames(saved);
      } catch (error) {
        // Ignore broken localStorage and fall back to preview.
      }
      return DEFAULT_NAMES;
    }

    function saveConfiguredNames(names) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(names));
    }

    function normalizeNames(value) {
      const list = Array.isArray(value) ? value : String(value).split(/\r?\n|,/);
      return [...new Set(list.map((name) => String(name).trim()).filter(Boolean))];
    }

    function keyForName(name) {
      return String(name).replace(/[^a-zA-Z0-9_-]/g, "_") || "unknown";
    }

    function clamp(value, min = 0, max = 100) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return min;
      return Math.min(max, Math.max(min, numeric));
    }

    function fmtPct(value) {
      const pct = clamp(value);
      return `${pct.toFixed(pct >= 10 ? 0 : 1)}%`;
    }

    function fmtNumber(value, digits = 1) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "--";
      return numeric.toFixed(digits);
    }

    function fmtBytes(bytes) {
      const numeric = Number(bytes);
      if (!Number.isFinite(numeric)) return "--";
      const units = ["B", "KB", "MB", "GB", "TB"];
      let value = numeric;
      let unit = 0;
      while (value >= 1024 && unit < units.length - 1) {
        value /= 1024;
        unit += 1;
      }
      return `${value.toFixed(unit < 2 ? 0 : 1)} ${units[unit]}`;
    }

    function setStatus(kind, text) {
      els.status.classList.toggle("online", kind === "online");
      els.statusText.textContent = text;
    }

    function setBar(element, value) {
      element.style.setProperty("--value", `${clamp(value)}%`);
    }

    function setRing(element, value) {
      element.style.setProperty("--pct", clamp(value));
    }

    function pageTemplate(name) {
      const key = keyForName(name);
      return `
        <section class="page computer-page" data-page="computer" data-name="${escapeHtml(name)}" data-key="${key}">
          <div class="page-shell">
            <header class="topbar">
              <div>
                <h1>${escapeHtml(name)}</h1>
                <div class="subline" data-field="subline">Waiting for MQTT payload</div>
              </div>
              <div class="status" data-field="localStatus"><span class="dot"></span><span>Idle</span></div>
            </header>

            <div class="content-grid">
              <section class="hero" aria-label="CPU dashboard">
                <div class="gauge-wrap">
                  <div class="gauge" data-field="cpuGauge">
                    <div class="gauge-center">
                      <div>
                        <div class="cpu-value" data-field="cpuValue">--</div>
                        <div class="cpu-label">CPU Load</div>
                      </div>
                    </div>
                  </div>
                  <div class="temp-module">
                    <div class="temp-title">Temperature</div>
                    <div class="temp-value"><strong data-field="tempValue">--</strong><span>°C</span></div>
                  </div>
                </div>
                <div class="quick-stats">
                  <div class="bar-row">
                    <div>CPU</div>
                    <div class="bar" data-field="cpuBar"></div>
                    <div class="value-right" data-field="cpuMini">--%</div>
                  </div>
                  <div class="bar-row">
                    <div>RAM</div>
                    <div class="bar" data-field="memBar"></div>
                    <div class="value-right" data-field="memMini">--%</div>
                  </div>
                  <div class="bar-row">
                    <div>Disk I/O</div>
                    <div class="bar" data-field="ioBar"></div>
                    <div class="value-right" data-field="ioMini">--</div>
                  </div>
                </div>
              </section>

              <section class="metrics-grid">
                <div class="panel">
                  <div class="panel-title">Memory <span data-field="memBytes">--</span></div>
                  <div class="duo">
                    <div class="ring" data-field="ramRing">
                      <div class="ring-face"><strong data-field="ramPct">--%</strong></div>
                      <span>RAM</span>
                    </div>
                    <div class="ring" data-field="swapRing">
                      <div class="ring-face"><strong data-field="swapPct">--%</strong></div>
                      <span>Swap</span>
                    </div>
                  </div>
                </div>

                <div class="panel">
                  <div class="panel-title">Network <span>Mbps</span></div>
                  <div class="net-grid">
                    <div class="net-cell">
                      <div class="label">Download</div>
                      <div class="number" data-field="downloadValue">--</div>
                      <div class="unit">Mb/s</div>
                    </div>
                    <div class="net-cell">
                      <div class="label">Upload</div>
                      <div class="number" data-field="uploadValue">--</div>
                      <div class="unit">Mb/s</div>
                    </div>
                  </div>
                  <svg class="sparkline" data-field="netSpark" viewBox="0 0 320 34" preserveAspectRatio="none" aria-hidden="true"></svg>
                </div>

                <div class="panel">
                  <div class="panel-title">Disk Usage <span data-field="diskCount">--</span></div>
                  <div class="disk-list" data-field="diskList"><div class="metric-row"><span>No disk data</span><strong>--</strong></div></div>
                </div>

                <div class="panel">
                  <div class="panel-title">Telemetry <span data-field="lastSeen">--</span></div>
                  <div class="metric-row"><span>CPU Cores</span><strong data-field="coresValue">--</strong></div>
                  <div class="metric-row"><span>OS</span><strong data-field="osValue">--</strong></div>
                  <div class="metric-row"><span>Temp Source</span><strong data-field="tempSource">--</strong></div>
                </div>
              </section>
            </div>

            <div class="footer-line" data-field="log">Swipe up/down to switch computers. Page key: ${key}</div>
          </div>
        </section>
      `;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function field(page, name) {
      return page.querySelector(`[data-field="${name}"]`);
    }

    function renderPages() {
      els.computerInput.value = state.configuredNames.join("\n");
      els.configuredCount.textContent = `${state.configuredNames.length} computers`;
      els.computerPages.innerHTML = state.configuredNames.map(pageTemplate).join("");
      renderPageDots();
      renderDetectedList();

      for (const [name, payload] of state.latestByName.entries()) {
        if (state.configuredNames.includes(name)) updateComputerPage(name, payload);
      }
    }

    function renderPageDots() {
      const pages = ["Setup", ...state.configuredNames];
      els.pageDots.innerHTML = pages.map((label, index) => (
        `<button class="page-dot" data-index="${index}" title="${escapeHtml(label)}" aria-label="${escapeHtml(label)}"></button>`
      )).join("");
      els.pageDots.querySelectorAll(".page-dot").forEach((button) => {
        button.addEventListener("click", () => scrollToPage(Number(button.dataset.index)));
      });
      updateActiveDot();
    }

    function renderDetectedList() {
      const names = [...state.detectedNames].sort();
      if (!names.length) {
        els.detectedList.innerHTML = `<div class="chip">No MQTT payload received yet</div>`;
        return;
      }

      els.detectedList.innerHTML = names.map((name) => {
        const configured = state.configuredNames.includes(name);
        const live = state.latestByName.has(name);
        const className = ["chip", configured ? "configured" : "", live ? "live" : ""].filter(Boolean).join(" ");
        return `<button class="${className}" data-name="${escapeHtml(name)}">${escapeHtml(name)}</button>`;
      }).join("");

      els.detectedList.querySelectorAll("button[data-name]").forEach((button) => {
        button.addEventListener("click", () => addComputerName(button.dataset.name));
      });
    }

    function addComputerName(name) {
      if (!name || state.configuredNames.includes(name)) return;
      state.configuredNames = normalizeNames([...state.configuredNames, name]);
      saveConfiguredNames(state.configuredNames);
      renderPages();
      els.setupLog.textContent = `Added ${name}. Swipe down to view it.`;
    }

    function applyConfiguredNames() {
      const names = normalizeNames(els.computerInput.value);
      state.configuredNames = names.length ? names : DEFAULT_NAMES;
      saveConfiguredNames(state.configuredNames);
      renderPages();
      els.setupLog.textContent = `Saved ${state.configuredNames.length} computer pages.`;
    }

    function scrollToPage(index) {
      const pages = [...document.querySelectorAll(".page")];
      pages[index]?.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function updateActiveDot() {
      const index = Math.round(els.snapRoot.scrollTop / Math.max(1, els.snapRoot.clientHeight));
      els.pageDots.querySelectorAll(".page-dot").forEach((dot, dotIndex) => {
        dot.classList.toggle("active", dotIndex === index);
      });
    }

    function renderDisks(container, disks = []) {
      field(container, "diskCount").textContent = `${disks.length} drives`;
      const diskList = field(container, "diskList");
      if (!disks.length) {
        diskList.innerHTML = `<div class="metric-row"><span>No disk data</span><strong>--</strong></div>`;
        return;
      }

      diskList.innerHTML = disks.slice(0, 4).map((disk) => {
        const pct = clamp(disk.used_percent);
        const name = disk.mountpoint || disk.device || "Disk";
        return `
          <div class="disk">
            <div class="disk-head">
              <strong>${escapeHtml(name)}</strong>
              <span>${fmtPct(pct)} · ${fmtBytes(disk.free_bytes)} free</span>
            </div>
            <div class="bar" style="--value:${pct}%"></div>
          </div>
        `;
      }).join("");
    }

    function drawSpark(name, svg, value) {
      const history = state.historyByName.get(name) || [];
      history.push(Number(value) || 0);
      while (history.length > 34) history.shift();
      state.historyByName.set(name, history);

      const width = 320;
      const height = 34;
      const max = Math.max(1, ...history);
      const points = history.map((item, index) => {
        const x = history.length <= 1 ? width : (index / (history.length - 1)) * width;
        const y = height - (item / max) * (height - 4) - 2;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(" ");

      svg.innerHTML = `
        <polyline points="${points}" fill="none" stroke="rgba(255,182,41,.95)" stroke-width="2"/>
        <polyline points="${points}" fill="none" stroke="rgba(102,239,255,.36)" stroke-width="5" opacity=".45"/>
      `;
    }

    function updateComputerPage(name, payload) {
      const page = document.querySelector(`.computer-page[data-key="${keyForName(name)}"]`);
      if (!page) return;

      const cpu = payload.cpu || {};
      const memory = payload.memory || {};
      const swap = payload.swap || {};
      const network = payload.network || {};
      const diskIo = payload.disk_io || {};
      const temp = cpu.temperature || {};
      const platform = payload.platform || {};

      const cpuPct = clamp(cpu.usage_percent);
      const memPct = clamp(memory.used_percent);
      const swapPct = clamp(swap.used_percent);
      const ioMbps = Number(diskIo.read_mbps || 0) + Number(diskIo.write_mbps || 0);
      const down = Number(network.download_mbps || 0);
      const up = Number(network.upload_mbps || 0);

      field(page, "subline").textContent = payload.timestamp ? `Updated ${new Date(payload.timestamp).toLocaleTimeString()}` : "Live payload received";
      const localStatus = field(page, "localStatus");
      localStatus.classList.add("online");
      localStatus.querySelector("span:last-child").textContent = "Live";

      field(page, "cpuGauge").style.setProperty("--cpu", cpuPct);
      field(page, "cpuValue").textContent = fmtNumber(cpuPct, cpuPct >= 10 ? 0 : 1);
      field(page, "cpuMini").textContent = fmtPct(cpuPct);
      setBar(field(page, "cpuBar"), cpuPct);

      field(page, "tempValue").textContent = temp.celsius == null ? "--" : fmtNumber(temp.celsius, 0);
      field(page, "tempSource").textContent = temp.available ? (temp.sensor || temp.source || "LibreHardwareMonitor") : "N/A";

      field(page, "memMini").textContent = fmtPct(memPct);
      setBar(field(page, "memBar"), memPct);
      setRing(field(page, "ramRing"), memPct);
      setRing(field(page, "swapRing"), swapPct);
      field(page, "ramPct").textContent = fmtPct(memPct);
      field(page, "swapPct").textContent = fmtPct(swapPct);
      field(page, "memBytes").textContent = `${fmtBytes(memory.used_bytes)} / ${fmtBytes(memory.total_bytes)}`;

      setBar(field(page, "ioBar"), Math.min(100, ioMbps * 20));
      field(page, "ioMini").textContent = `${fmtNumber(ioMbps, 2)}M`;

      field(page, "downloadValue").textContent = fmtNumber(down, down >= 10 ? 1 : 2);
      field(page, "uploadValue").textContent = fmtNumber(up, up >= 10 ? 1 : 2);
      drawSpark(name, field(page, "netSpark"), down + up);

      renderDisks(page, payload.disks || []);
      field(page, "coresValue").textContent = `${cpu.physical_count ?? "--"}P / ${cpu.logical_count ?? "--"}L`;
      field(page, "osValue").textContent = [platform.system, platform.release].filter(Boolean).join(" ") || "--";
      field(page, "lastSeen").textContent = payload.timestamp ? new Date(payload.timestamp).toLocaleTimeString() : "--";
      field(page, "log").textContent = `Topic ${els.topicInput.value.trim()} · ${name}`;
    }

    function handlePayload(payload) {
      const name = String(payload.computer_name || "").trim();
      if (!name) return;

      state.detectedNames.add(name);
      state.latestByName.set(name, payload);
      renderDetectedList();

      if (state.configuredNames.includes(name)) {
        updateComputerPage(name, payload);
      }
    }

    function connectMqtt() {
      const brokerUrl = els.brokerInput.value.trim();
      const topic = els.topicInput.value.trim();
      if (!brokerUrl || !topic) {
        els.setupLog.textContent = "Enter WebSocket and topic first.";
        return;
      }

      if (state.client) {
        state.client.end(true);
        state.client = null;
      }

      setStatus("offline", "Connecting");
      els.setupLog.textContent = `Connecting: ${brokerUrl}`;

      state.client = mqtt.connect(brokerUrl, {
        clientId: `fleet_dashboard_${Math.random().toString(16).slice(2, 10)}`,
        clean: true,
        reconnectPeriod: 2500,
        connectTimeout: 8000
      });

      state.client.on("connect", () => {
        state.connected = true;
        setStatus("online", "Online");
        state.client.subscribe(topic, { qos: 0 }, (error) => {
          els.setupLog.textContent = error ? `Subscribe failed: ${error.message}` : `Subscribed: ${topic}`;
        });
      });

      state.client.on("message", (_topic, message) => {
        try {
          handlePayload(JSON.parse(message.toString()));
        } catch (error) {
          els.setupLog.textContent = `Invalid JSON payload: ${error.message}`;
        }
      });

      state.client.on("reconnect", () => {
        state.connected = false;
        setStatus("offline", "Retrying");
      });

      state.client.on("close", () => {
        state.connected = false;
        if (state.client) setStatus("offline", "Offline");
      });

      state.client.on("error", (error) => {
        els.setupLog.textContent = `MQTT error: ${error.message}`;
      });
    }

    function disconnectMqtt() {
      if (state.client) {
        state.client.end(true);
        state.client = null;
      }
      state.connected = false;
      setStatus("offline", "Offline");
      els.setupLog.textContent = "MQTT disconnected.";
    }

    function clearData() {
      state.latestByName.clear();
      state.detectedNames.clear();
      state.historyByName.clear();
      renderPages();
      els.setupLog.textContent = "Cleared received payload cache.";
    }

    async function enterFullscreen() {
      const root = document.documentElement;
      try {
        if (document.fullscreenElement) return true;
        if (root.requestFullscreen) {
          await root.requestFullscreen({ navigationUI: "hide" });
          return true;
        }
        if (root.webkitRequestFullscreen) {
          root.webkitRequestFullscreen();
          return true;
        }
      } catch (error) {
        return false;
      }
      return false;
    }

    function isStandaloneDisplay() {
      return window.matchMedia("(display-mode: standalone)").matches ||
        window.matchMedia("(display-mode: fullscreen)").matches ||
        window.navigator.standalone === true;
    }

    function nudgeMobileAddressBar() {
      if (isStandaloneDisplay()) return;
      if (window.innerWidth > window.innerHeight) return;
      setTimeout(() => window.scrollTo(0, 1), 250);
      setTimeout(() => window.scrollTo(0, 1), 900);
    }

    function enableFullscreenFallback() {
      const activate = async () => {
        if (await enterFullscreen()) {
          window.removeEventListener("pointerdown", activate);
          window.removeEventListener("touchstart", activate);
          window.removeEventListener("click", activate);
        }
      };

      window.addEventListener("pointerdown", activate, { passive: true });
      window.addEventListener("touchstart", activate, { passive: true });
      window.addEventListener("click", activate);
    }

    els.saveButton.addEventListener("click", applyConfiguredNames);
    els.connectButton.addEventListener("click", connectMqtt);
    els.disconnectButton.addEventListener("click", disconnectMqtt);
    els.clearButton.addEventListener("click", clearData);
    els.snapRoot.addEventListener("scroll", updateActiveDot, { passive: true });
    window.addEventListener("orientationchange", nudgeMobileAddressBar);

    window.addEventListener("load", async () => {
      if (!(await enterFullscreen())) enableFullscreenFallback();
      nudgeMobileAddressBar();
    });

    renderPages();
    handlePayload({
      computer_name: "Preview Mode",
      timestamp: new Date().toISOString(),
      platform: { system: "Windows", release: "11" },
      cpu: {
        usage_percent: 7,
        logical_count: 16,
        physical_count: 8,
        temperature: { celsius: 47, available: true, sensor: "CPU Package" }
      },
      memory: {
        total_bytes: 32 * 1024 ** 3,
        used_bytes: 9.7 * 1024 ** 3,
        used_percent: 30.7
      },
      swap: {
        total_bytes: 16 * 1024 ** 3,
        used_bytes: 2.1 * 1024 ** 3,
        used_percent: 13.2
      },
      network: { download_mbps: 3.64, upload_mbps: 0.11 },
      disks: [
        { mountpoint: "C:\\", used_percent: 74.2, free_bytes: 122 * 1024 ** 3 },
        { mountpoint: "D:\\", used_percent: 42.6, free_bytes: 390 * 1024 ** 3 }
      ],
      disk_io: { read_mbps: 0.02, write_mbps: 0.08 }
    });
    connectMqtt();
  </script>
</body>
</html>

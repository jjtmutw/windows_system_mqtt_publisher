<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050607">
  <title>Windows System MQTT Dashboard</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050607;
      --panel: rgba(14, 16, 18, 0.86);
      --panel-strong: rgba(22, 23, 24, 0.94);
      --line: rgba(255, 255, 255, 0.18);
      --line-hot: rgba(255, 188, 64, 0.78);
      --text: #f5f7f8;
      --muted: #8e969c;
      --subtle: #566069;
      --amber: #ffb629;
      --amber-2: #ff7c1f;
      --cyan: #66efff;
      --green: #4ef2a4;
      --red: #ff5364;
      --shadow: 0 0 34px rgba(255, 159, 37, 0.16);
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100svh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 182, 41, 0.12), transparent 34%),
        radial-gradient(circle at 100% 0%, rgba(102, 239, 255, 0.08), transparent 28%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%) 0 0 / 9px 9px,
        var(--bg);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px) 0 0 / 100% 42px,
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px) 0 0 / 42px 100%;
      mask-image: linear-gradient(to bottom, black, transparent 74%);
    }

    .app {
      width: min(100%, 460px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 12px max(18px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .brand {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 800;
      text-transform: uppercase;
    }

    .host {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .layoutMark {
      display: none;
      color: var(--amber);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 88px;
      justify-content: center;
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.035);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 12px currentColor;
      color: var(--red);
    }

    .status.online {
      color: var(--green);
      border-color: rgba(78, 242, 164, 0.36);
    }

    .status.online .dot {
      background: var(--green);
      color: var(--green);
    }

    .hero {
      position: relative;
      min-height: 318px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.08), transparent 28%),
        linear-gradient(315deg, rgba(255, 182, 41, 0.11), transparent 38%),
        var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    .hero::after {
      inset: auto 0 0;
      height: 46%;
      border: 0;
      background: linear-gradient(to top, rgba(5, 6, 7, 0.82), transparent);
    }

    .gauge-wrap {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 236px;
      padding-top: 16px;
      z-index: 1;
    }

    .gauge {
      --cpu: 0;
      width: min(72vw, 268px);
      aspect-ratio: 1;
      position: relative;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.08) 0 4%, transparent 5% 100%),
        repeating-conic-gradient(from -90deg, rgba(255, 255, 255, 0.65) 0 1deg, transparent 1deg 5deg),
        conic-gradient(from -135deg, var(--amber) calc(var(--cpu) * 2.7deg), rgba(255, 255, 255, 0.08) 0 270deg, transparent 0);
      filter: drop-shadow(0 0 26px rgba(255, 181, 41, 0.24));
    }

    .gauge::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background:
        radial-gradient(circle, #0d0f10 0 37%, transparent 38%),
        conic-gradient(from -135deg, rgba(255, 182, 41, 0.44), transparent 54%, rgba(102, 239, 255, 0.16), transparent 78%);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .gauge::after {
      content: "";
      position: absolute;
      width: 40%;
      height: 2px;
      left: 50%;
      top: 50%;
      transform-origin: 0 50%;
      transform: rotate(calc(-135deg + var(--cpu) * 2.7deg));
      background: linear-gradient(90deg, var(--amber), transparent);
      box-shadow: 0 0 16px var(--amber);
    }

    .gauge-center {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 44%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, #1d2022, #08090a 70%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-align: center;
    }

    .cpu-value {
      font-size: 34px;
      line-height: 1;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .cpu-label {
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
    }

    .temp-module {
      position: absolute;
      right: 14px;
      bottom: 70px;
      z-index: 2;
      min-width: 142px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      background: rgba(5, 6, 7, 0.78);
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    }

    .temp-title {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
    }

    .temp-value {
      margin-top: 2px;
      display: flex;
      align-items: baseline;
      gap: 3px;
      font-size: 34px;
      line-height: 1;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .temp-value span {
      font-size: 17px;
      color: var(--amber);
    }

    .quick-stats {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 10px;
      padding: 0 14px 14px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 72px 1fr 42px;
      gap: 9px;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }

    .bar {
      height: 3px;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.55) 0 1px, transparent 1px 5px),
        linear-gradient(90deg, var(--amber) var(--value), rgba(255, 255, 255, 0.14) 0);
      box-shadow: 0 0 12px rgba(255, 182, 41, 0.25);
    }

    .value-right {
      text-align: right;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: grid;
      gap: 8px;
      margin: 12px 0;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.34);
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      min-height: 36px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 0;
      color: var(--text);
      background: rgba(255, 255, 255, 0.055);
      font: 600 12px/1.2 "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
      outline: none;
    }

    input:focus {
      border-color: rgba(255, 182, 41, 0.7);
      box-shadow: 0 0 0 2px rgba(255, 182, 41, 0.12);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      min-height: 36px;
      border: 1px solid rgba(255, 182, 41, 0.55);
      border-radius: 0;
      color: #120b02;
      background: linear-gradient(180deg, #ffd26f, #ff9f1f);
      font: 800 11px/1 "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    button.secondary {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .panel {
      position: relative;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), transparent 34%),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 6px),
        var(--panel);
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 28px;
      height: 28px;
      border-top: 1px solid var(--line-hot);
      border-right: 1px solid var(--line-hot);
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 11px;
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .panel-title span {
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      text-transform: none;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 12px;
    }

    .metric-row strong {
      color: var(--text);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .duo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .ring {
      --pct: 0;
      display: grid;
      place-items: center;
      min-height: 116px;
      text-align: center;
    }

    .ring-face {
      width: 88px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle, #101214 0 54%, transparent 55%),
        conic-gradient(var(--amber) calc(var(--pct) * 1%), rgba(255, 255, 255, 0.12) 0);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 0 20px rgba(255, 182, 41, 0.13);
    }

    .ring strong {
      display: block;
      font-size: 18px;
      font-variant-numeric: tabular-nums;
    }

    .ring span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
    }

    .net-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .net-cell {
      min-height: 82px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.24);
    }

    .net-cell .label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
    }

    .net-cell .number {
      margin-top: 10px;
      font-size: 24px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .net-cell .unit {
      color: var(--cyan);
      font-size: 11px;
    }

    .disk-list {
      display: grid;
      gap: 9px;
    }

    .disk {
      display: grid;
      gap: 7px;
    }

    .disk-head {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 11px;
    }

    .disk-head strong {
      color: var(--text);
    }

    .sparkline {
      width: 100%;
      height: 34px;
      display: block;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .log {
      margin: 12px 0 0;
      color: var(--subtle);
      font-size: 10px;
      line-height: 1.5;
      word-break: break-word;
    }

    .empty {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (min-width: 390px) {
      .app {
        padding-inline: 14px;
      }

      .hero {
        min-height: 338px;
      }

      .gauge-wrap {
        min-height: 252px;
      }
    }

    @media (orientation: landscape) {
      body {
        overflow: hidden;
      }

      .app {
        width: 100%;
        max-width: none;
        height: 100svh;
        max-height: 100svh;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(250px, 34vw) minmax(158px, 19vw) 1fr;
        grid-template-rows: 36px minmax(0, 1fr) 14px;
        grid-template-areas:
          "top top top"
          "hero controls metrics"
          "log log log";
        gap: 8px;
        padding: max(8px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(7px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      }

      .topbar {
        grid-area: top;
        margin: 0;
      }

      h1 {
        font-size: 15px;
      }

      .host {
        margin-top: 2px;
        font-size: 10px;
      }

      .layoutMark {
        display: inline;
      }

      .status {
        min-width: 78px;
        padding: 6px 8px;
        font-size: 10px;
      }

      .hero {
        grid-area: hero;
        min-height: 0;
        height: 100%;
      }

      .hero::before {
        inset: 9px;
      }

      .gauge-wrap {
        min-height: 0;
        height: calc(100% - 86px);
        padding-top: 5px;
      }

      .gauge {
        width: min(28vw, calc(100svh - 120px), 210px);
      }

      .cpu-value {
        font-size: 27px;
      }

      .cpu-label {
        font-size: 9px;
      }

      .temp-module {
        right: 9px;
        bottom: 60px;
        min-width: 108px;
        padding: 7px 8px;
      }

      .temp-title {
        font-size: 8px;
      }

      .temp-value {
        font-size: 25px;
      }

      .temp-value span {
        font-size: 13px;
      }

      .quick-stats {
        gap: 6px;
        padding: 0 10px 9px;
      }

      .bar-row {
        grid-template-columns: 58px 1fr 34px;
        gap: 7px;
        font-size: 9px;
      }

      .controls {
        grid-area: controls;
        align-self: stretch;
        margin: 0;
        padding: 8px;
        gap: 7px;
        overflow: hidden;
      }

      label {
        gap: 4px;
        font-size: 8px;
      }

      input {
        min-height: 29px;
        padding: 6px 7px;
        font-size: 10px;
      }

      .button-row {
        gap: 7px;
      }

      button {
        min-height: 30px;
        font-size: 9px;
      }

      .grid {
        grid-area: metrics;
        min-height: 0;
        height: 100%;
        overflow: hidden;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .panel {
        min-height: 0;
        padding: 8px;
      }

      .panel-title {
        margin-bottom: 7px;
        font-size: 10px;
      }

      .panel-title span {
        font-size: 8px;
      }

      .duo {
        gap: 7px;
      }

      .ring {
        min-height: 78px;
      }

      .ring-face {
        width: min(58px, 11vw);
      }

      .ring strong {
        font-size: 13px;
      }

      .ring span {
        margin-top: 5px;
        font-size: 9px;
      }

      .net-grid {
        gap: 7px;
      }

      .net-cell {
        min-height: 58px;
        padding: 7px;
      }

      .net-cell .label {
        font-size: 8px;
      }

      .net-cell .number {
        margin-top: 5px;
        font-size: 18px;
      }

      .net-cell .unit {
        font-size: 9px;
      }

      .sparkline {
        height: 24px;
      }

      .disk-list {
        gap: 6px;
      }

      .disk {
        gap: 5px;
      }

      .disk-head {
        font-size: 9px;
      }

      .metric-row {
        padding: 5px 0;
        font-size: 9px;
      }

      .metric-row strong {
        font-size: 10px;
        max-width: 56%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .empty {
        font-size: 10px;
      }

      .log {
        grid-area: log;
        margin: 0;
        font-size: 9px;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    }

      overflow: hidden;
    }

      gap: 6px;
    }

    body.landscape-mode .disk {
      gap: 5px;
    }

    body.landscape-mode .disk-head {
      font-size: 9px;
    }

    body.landscape-mode .metric-row {
      padding: 5px 0;
      font-size: 9px;
    }

    body.landscape-mode .metric-row strong {
      font-size: 10px;
      max-width: 56%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    body.landscape-mode .empty {
      font-size: 10px;
    }

    body.landscape-mode .log {
      grid-area: log;
      margin: 0;
      font-size: 9px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (prefers-reduced-motion: no-preference) {
      .gauge {
        transition: background 450ms ease, filter 450ms ease;
      }

      .bar,
      .ring-face {
        transition: background 420ms ease;
      }

      .panel {
        animation: panelIn 420ms ease both;
      }

      @keyframes panelIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>System Core</h1>
        <div class="host"><span id="computerName">等待 MQTT 資料</span><span class="layoutMark"> · LANDSCAPE HUD v2</span></div>
      </div>
      <div class="status" id="status"><span class="dot"></span><span id="statusText">Offline</span></div>
    </header>

    <section class="hero" aria-label="CPU dashboard">
      <div class="gauge-wrap">
        <div class="gauge" id="cpuGauge">
          <div class="gauge-center">
            <div>
              <div class="cpu-value" id="cpuValue">--</div>
              <div class="cpu-label">CPU Load</div>
            </div>
          </div>
        </div>
        <div class="temp-module">
          <div class="temp-title">Temperature</div>
          <div class="temp-value"><strong id="tempValue">--</strong><span>°C</span></div>
        </div>
      </div>
      <div class="quick-stats">
        <div class="bar-row">
          <div>CPU 使用率</div>
          <div class="bar" id="cpuBar"></div>
          <div class="value-right" id="cpuMini">--%</div>
        </div>
        <div class="bar-row">
          <div>記憶體</div>
          <div class="bar" id="memBar"></div>
          <div class="value-right" id="memMini">--%</div>
        </div>
        <div class="bar-row">
          <div>硬碟 I/O</div>
          <div class="bar" id="ioBar"></div>
          <div class="value-right" id="ioMini">--</div>
        </div>
      </div>
    </section>

    <section class="controls" aria-label="MQTT settings">
      <label>
        WebSocket
        <input id="brokerInput" value="wss://broker.emqx.io:8084/mqtt" autocomplete="off">
      </label>
      <label>
        Topic
        <input id="topicInput" value="jj/windows/system/status" autocomplete="off">
      </label>
      <div class="button-row">
        <button id="connectButton">Connect</button>
        <button class="secondary" id="disconnectButton">Disconnect</button>
      </div>
    </section>

    <section class="grid" aria-label="System metrics">
      <div class="panel">
        <div class="panel-title">Memory <span id="memBytes">--</span></div>
        <div class="duo">
          <div class="ring" id="ramRing">
            <div class="ring-face"><strong id="ramPct">--%</strong></div>
            <span>RAM</span>
          </div>
          <div class="ring" id="swapRing">
            <div class="ring-face"><strong id="swapPct">--%</strong></div>
            <span>Swap</span>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Network <span>Mbps</span></div>
        <div class="net-grid">
          <div class="net-cell">
            <div class="label">Download</div>
            <div class="number" id="downloadValue">--</div>
            <div class="unit">Mb/s</div>
          </div>
          <div class="net-cell">
            <div class="label">Upload</div>
            <div class="number" id="uploadValue">--</div>
            <div class="unit">Mb/s</div>
          </div>
        </div>
        <svg class="sparkline" id="netSpark" viewBox="0 0 320 34" preserveAspectRatio="none" aria-hidden="true"></svg>
      </div>

      <div class="panel">
        <div class="panel-title">Disk Usage <span id="diskCount">--</span></div>
        <div class="disk-list" id="diskList">
          <div class="empty">等待硬碟資料。</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Telemetry <span id="lastSeen">--</span></div>
        <div class="metric-row"><span>CPU Cores</span><strong id="coresValue">--</strong></div>
        <div class="metric-row"><span>OS</span><strong id="osValue">--</strong></div>
        <div class="metric-row"><span>Temperature Source</span><strong id="tempSource">--</strong></div>
      </div>
    </section>

    <p class="log" id="log">尚未連線。</p>
  </main>

  <script>
    async function enterFullscreen() {
      const root = document.documentElement;
      try {
        if (document.fullscreenElement) return true;
        if (root.requestFullscreen) {
          await root.requestFullscreen({ navigationUI: "hide" });
          return true;
        }
        if (root.webkitRequestFullscreen) {
          root.webkitRequestFullscreen();
          return true;
        }
      } catch (error) {
        return false;
      }
      return false;
    }

    function enableFullscreenFallback() {
      const activate = async () => {
        if (await enterFullscreen()) {
          window.removeEventListener("pointerdown", activate);
          window.removeEventListener("touchstart", activate);
          window.removeEventListener("click", activate);
        }
      };

      window.addEventListener("pointerdown", activate, { passive: true });
      window.addEventListener("touchstart", activate, { passive: true });
      window.addEventListener("click", activate);
    }

    window.addEventListener("load", async () => {
      if (!(await enterFullscreen())) {
        enableFullscreenFallback();
      }
    });

    function syncLayoutMode() {
      document.body.classList.toggle("landscape-mode", window.innerWidth > window.innerHeight);
    }

    syncLayoutMode();
    window.addEventListener("resize", syncLayoutMode);
    window.addEventListener("orientationchange", syncLayoutMode);

    const els = {
      status: document.querySelector("#status"),
      statusText: document.querySelector("#statusText"),
      computerName: document.querySelector("#computerName"),
      cpuGauge: document.querySelector("#cpuGauge"),
      cpuValue: document.querySelector("#cpuValue"),
      tempValue: document.querySelector("#tempValue"),
      cpuBar: document.querySelector("#cpuBar"),
      cpuMini: document.querySelector("#cpuMini"),
      memBar: document.querySelector("#memBar"),
      memMini: document.querySelector("#memMini"),
      ioBar: document.querySelector("#ioBar"),
      ioMini: document.querySelector("#ioMini"),
      brokerInput: document.querySelector("#brokerInput"),
      topicInput: document.querySelector("#topicInput"),
      connectButton: document.querySelector("#connectButton"),
      disconnectButton: document.querySelector("#disconnectButton"),
      ramRing: document.querySelector("#ramRing"),
      swapRing: document.querySelector("#swapRing"),
      ramPct: document.querySelector("#ramPct"),
      swapPct: document.querySelector("#swapPct"),
      memBytes: document.querySelector("#memBytes"),
      downloadValue: document.querySelector("#downloadValue"),
      uploadValue: document.querySelector("#uploadValue"),
      netSpark: document.querySelector("#netSpark"),
      diskCount: document.querySelector("#diskCount"),
      diskList: document.querySelector("#diskList"),
      lastSeen: document.querySelector("#lastSeen"),
      coresValue: document.querySelector("#coresValue"),
      osValue: document.querySelector("#osValue"),
      tempSource: document.querySelector("#tempSource"),
      log: document.querySelector("#log")
    };

    let client = null;
    const netHistory = [];

    function clamp(value, min = 0, max = 100) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return min;
      return Math.min(max, Math.max(min, numeric));
    }

    function fmtPct(value) {
      return `${clamp(value).toFixed(value >= 10 ? 0 : 1)}%`;
    }

    function fmtNumber(value, digits = 1) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "--";
      return numeric.toFixed(digits);
    }

    function fmtBytes(bytes) {
      const numeric = Number(bytes);
      if (!Number.isFinite(numeric)) return "--";
      const units = ["B", "KB", "MB", "GB", "TB"];
      let value = numeric;
      let unit = 0;
      while (value >= 1024 && unit < units.length - 1) {
        value /= 1024;
        unit += 1;
      }
      return `${value.toFixed(unit < 2 ? 0 : 1)} ${units[unit]}`;
    }

    function setStatus(kind, text) {
      els.status.classList.toggle("online", kind === "online");
      els.statusText.textContent = text;
    }

    function setBar(element, value) {
      element.style.setProperty("--value", `${clamp(value)}%`);
    }

    function setRing(element, value) {
      element.style.setProperty("--pct", clamp(value));
    }

    function drawSpark(values) {
      const width = 320;
      const height = 34;
      const max = Math.max(1, ...values);
      const points = values.map((value, index) => {
        const x = values.length <= 1 ? width : (index / (values.length - 1)) * width;
        const y = height - (value / max) * (height - 4) - 2;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(" ");

      els.netSpark.innerHTML = `
        <polyline points="${points}" fill="none" stroke="rgba(255,182,41,.95)" stroke-width="2"/>
        <polyline points="${points}" fill="none" stroke="rgba(102,239,255,.36)" stroke-width="5" opacity=".45"/>
      `;
    }

    function renderDisks(disks = []) {
      els.diskCount.textContent = `${disks.length} drives`;
      if (!disks.length) {
        els.diskList.innerHTML = `<div class="empty">沒有收到硬碟資料。</div>`;
        return;
      }

      els.diskList.innerHTML = disks.map((disk) => {
        const pct = clamp(disk.used_percent);
        const name = disk.mountpoint || disk.device || "Disk";
        return `
          <div class="disk">
            <div class="disk-head">
              <strong>${name}</strong>
              <span>${fmtPct(pct)} · ${fmtBytes(disk.free_bytes)} free</span>
            </div>
            <div class="bar" style="--value:${pct}%"></div>
          </div>
        `;
      }).join("");
    }

    function updateDashboard(payload) {
      const cpu = payload.cpu || {};
      const memory = payload.memory || {};
      const swap = payload.swap || {};
      const network = payload.network || {};
      const diskIo = payload.disk_io || {};
      const temp = cpu.temperature || {};
      const platform = payload.platform || {};

      const cpuPct = clamp(cpu.usage_percent);
      const memPct = clamp(memory.used_percent);
      const swapPct = clamp(swap.used_percent);
      const ioMbps = Number(diskIo.read_mbps || 0) + Number(diskIo.write_mbps || 0);

      els.computerName.textContent = payload.computer_name || "Unknown computer";
      els.cpuGauge.style.setProperty("--cpu", cpuPct);
      els.cpuValue.textContent = fmtNumber(cpuPct, cpuPct >= 10 ? 0 : 1);
      els.cpuMini.textContent = fmtPct(cpuPct);
      setBar(els.cpuBar, cpuPct);

      els.tempValue.textContent = temp.celsius == null ? "--" : fmtNumber(temp.celsius, 0);
      els.tempSource.textContent = temp.available ? (temp.sensor || temp.source || "LibreHardwareMonitor") : "N/A";

      els.memMini.textContent = fmtPct(memPct);
      setBar(els.memBar, memPct);
      setRing(els.ramRing, memPct);
      setRing(els.swapRing, swapPct);
      els.ramPct.textContent = fmtPct(memPct);
      els.swapPct.textContent = fmtPct(swapPct);
      els.memBytes.textContent = `${fmtBytes(memory.used_bytes)} / ${fmtBytes(memory.total_bytes)}`;

      setBar(els.ioBar, Math.min(100, ioMbps * 20));
      els.ioMini.textContent = `${fmtNumber(ioMbps, 2)}M`;

      const down = Number(network.download_mbps || 0);
      const up = Number(network.upload_mbps || 0);
      els.downloadValue.textContent = fmtNumber(down, down >= 10 ? 1 : 2);
      els.uploadValue.textContent = fmtNumber(up, up >= 10 ? 1 : 2);
      netHistory.push(down + up);
      while (netHistory.length > 34) netHistory.shift();
      drawSpark(netHistory);

      renderDisks(payload.disks || []);

      const logical = cpu.logical_count ?? "--";
      const physical = cpu.physical_count ?? "--";
      els.coresValue.textContent = `${physical}P / ${logical}L`;
      els.osValue.textContent = [platform.system, platform.release].filter(Boolean).join(" ") || "--";
      els.lastSeen.textContent = payload.timestamp ? new Date(payload.timestamp).toLocaleTimeString() : "--";
      els.log.textContent = `Last payload: ${payload.timestamp || "unknown time"}`;
    }

    function connectMqtt() {
      const brokerUrl = els.brokerInput.value.trim();
      const topic = els.topicInput.value.trim();
      if (!brokerUrl || !topic) {
        els.log.textContent = "請輸入 WebSocket 與 Topic。";
        return;
      }

      if (client) {
        client.end(true);
        client = null;
      }

      setStatus("offline", "Connecting");
      els.log.textContent = `連線中：${brokerUrl}`;

      client = mqtt.connect(brokerUrl, {
        clientId: `mobile_dashboard_${Math.random().toString(16).slice(2, 10)}`,
        clean: true,
        reconnectPeriod: 2500,
        connectTimeout: 8000
      });

      client.on("connect", () => {
        setStatus("online", "Online");
        client.subscribe(topic, { qos: 0 }, (error) => {
          els.log.textContent = error ? `訂閱失敗：${error.message}` : `已訂閱：${topic}`;
        });
      });

      client.on("message", (_topic, message) => {
        try {
          updateDashboard(JSON.parse(message.toString()));
        } catch (error) {
          els.log.textContent = `Payload 不是有效 JSON：${error.message}`;
        }
      });

      client.on("reconnect", () => {
        setStatus("offline", "Retrying");
      });

      client.on("close", () => {
        if (client) setStatus("offline", "Offline");
      });

      client.on("error", (error) => {
        els.log.textContent = `MQTT 錯誤：${error.message}`;
      });
    }

    function disconnectMqtt() {
      if (client) {
        client.end(true);
        client = null;
      }
      setStatus("offline", "Offline");
      els.log.textContent = "已中斷 MQTT 連線。";
    }

    els.connectButton.addEventListener("click", connectMqtt);
    els.disconnectButton.addEventListener("click", disconnectMqtt);

    updateDashboard({
      computer_name: "Preview Mode",
      timestamp: new Date().toISOString(),
      platform: { system: "Windows", release: "11" },
      cpu: {
        usage_percent: 7,
        logical_count: 16,
        physical_count: 8,
        temperature: { celsius: 47, available: true, sensor: "CPU Package" }
      },
      memory: {
        total_bytes: 32 * 1024 ** 3,
        used_bytes: 9.7 * 1024 ** 3,
        used_percent: 30.7
      },
      swap: {
        total_bytes: 16 * 1024 ** 3,
        used_bytes: 2.1 * 1024 ** 3,
        used_percent: 13.2
      },
      network: { download_mbps: 3.64, upload_mbps: 0.11 },
      disks: [
        { mountpoint: "C:\\", used_percent: 74.2, free_bytes: 122 * 1024 ** 3 },
        { mountpoint: "D:\\", used_percent: 42.6, free_bytes: 390 * 1024 ** 3 }
      ],
      disk_io: { read_mbps: 0.02, write_mbps: 0.08 }
    });
  </script>
</body>
</html>
